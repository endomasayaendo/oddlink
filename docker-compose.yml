services:
  db:
    image: postgres:17
    container_name: oddlink-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - oddlink-data:/var/lib/postgresql/data

volumes:
  oddlink-data:
